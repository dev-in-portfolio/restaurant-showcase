name: Temporary Phase 1 showcase audit

on:
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out showcase
        uses: actions/checkout@v4
        with:
          path: showcase

      - name: Check out staging
        uses: actions/checkout@v4
        with:
          repository: dev-in-portfolio/restaurant-staging
          ref: main
          path: staging

      - name: Build detailed audit report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out/candidates
          {
            echo '# Existing showcase restaurant folders'
            find showcase/restaurants -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort
            echo
            echo '# All staging restaurant folders'
            find staging/restaurants -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort
            echo
            echo '# Candidate metadata matches'
            patterns=('Bahn Thai' 'Bao & Broth' "Bart's Mart" "Beef 'N Bottle" 'Boudreaux' "Brooks' Sandwich House" 'Cafe South' 'Carolina Scoops' 'Caswell Station' 'Cornerstone Pub' 'Curry Gate' '^Dish$' 'E.L.K. Tavern' 'Enderly Coffee' 'Euro Grill' "Gus' Family Restaurant")
            for p in "${patterns[@]}"; do
              echo "## $p"
              grep -rilE "\"name\"[[:space:]]*:[[:space:]]*\"[^\"]*${p}" staging/restaurants/*/restaurant.json 2>/dev/null || true
            done
            echo
            echo '# Existing showcase data index'
            cat showcase/data/restaurants.json
          } > out/audit.txt

          cp showcase/data/restaurants.json out/showcase-restaurants.json
          cp showcase/scripts/import-approved-restaurant.js out/import-approved-restaurant.js
          cp showcase/scripts/validate-showcase.js out/validate-showcase.js
          cp showcase/package.json out/showcase-package.json
          cp staging/package.json out/staging-package.json

          while IFS= read -r metadata; do
            [ -n "$metadata" ] || continue
            slug="$(basename "$(dirname "$metadata")")"
            mkdir -p "out/candidates/$slug"
            cp "$metadata" "out/candidates/$slug/restaurant.json"
            find "staging/restaurants/$slug" -maxdepth 1 -type f -printf '%f\n' | sort > "out/candidates/$slug/files.txt"
            find "staging/restaurants/$slug" -maxdepth 1 -type f -name '*.html' -printf '%f\n' | sort > "out/candidates/$slug/html.txt"
          done < <(grep -rilE '"name"[[:space:]]*:[[:space:]]*"(Bahn Thai|Bao & Broth|Bart.s Mart|Beef .N Bottle|Boudreaux|Brooks. Sandwich House|Cafe South|Carolina Scoops|Caswell Station|Cornerstone Pub|Curry Gate|Dish|E\.L\.K\. Tavern|Enderly Coffee|Euro Grill|Gus. Family Restaurant)' staging/restaurants/*/restaurant.json 2>/dev/null | sort -u)

      - name: Upload audit
        uses: actions/upload-artifact@v4
        with:
          name: phase1-showcase-audit-detailed
          path: out
