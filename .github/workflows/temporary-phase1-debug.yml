name: Temporary Phase 1 diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: dev-in-portfolio/restaurant-staging
          ref: main
          path: staging

      - name: Diagnose the 16 source builds
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          cat > /tmp/diagnose.js <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = path.resolve('staging/restaurants');
          const slugs = ['bahn-thai','bao-and-broth','barts-mart','beef-n-bottle','boudreauxs','brooks-sandwich-house','cafe-south','carolina-scoops','caswell-station','cornerstone-pub-grill','curry-gate','dish','elk-monroe','enderly-coffee-co','euro-grill-and-cafe','gus-restaurant'];
          const placeholders = [/lorem\s+ipsum/i,/\btodo\b/i,/\bfixme\b/i,/insert\s+(here|text|details)/i,/\[name\]/i,/\[phone\]/i,/\[address\]/i,/concept content for/i];
          const report = [];
          const strip = html => html.replace(/<script[\s\S]*?<\/script>/gi,' ').replace(/<style[\s\S]*?<\/style>/gi,' ').replace(/<[^>]+>/g,' ').replace(/&nbsp;|&#160;/gi,' ').replace(/&amp;/gi,'&').replace(/\s+/g,' ').trim();
          const walk = dir => fs.readdirSync(dir,{withFileTypes:true}).flatMap(e => e.isDirectory() ? walk(path.join(dir,e.name)) : [path.join(dir,e.name)]);
          const exists = (file, ref, dir) => {
            const clean = ref.split('#')[0].split('?')[0].trim();
            if (!clean || /^(https?:|\/\/|mailto:|tel:|sms:|javascript:|data:|blob:)/i.test(clean)) return true;
            let decoded=clean; try{decoded=decodeURIComponent(clean)}catch{}
            const resolved=decoded.startsWith('/')?path.join(dir,decoded.replace(/^\/+/,'')):path.resolve(path.dirname(file),decoded);
            return fs.existsSync(resolved);
          };
          for(const slug of slugs){
            const dir=path.join(root,slug);
            const item={slug,exists:fs.existsSync(dir),issues:[],pages:[]};
            if(!item.exists){item.issues.push('missing folder');report.push(item);continue;}
            let files=walk(dir); let htmls=files.filter(f=>f.endsWith('.html'));
            if(htmls.length<6)item.issues.push(`only ${htmls.length} html files`);
            const titles=new Map();
            for(const f of htmls){
              const html=fs.readFileSync(f,'utf8'); const rel=path.relative(dir,f); const text=strip(html);
              const title=((html.match(/<title[^>]*>([\s\S]*?)<\/title>/i)||[,''])[1]||'').replace(/\s+/g,' ').trim();
              const ph=[]; for(const p of placeholders){const m=html.match(p);if(m)ph.push(m[0]);}
              const broken=[...html.matchAll(/(?:src|href)=["']([^"']+)["']/gi)].map(m=>m[1]).filter(ref=>!exists(f,ref,dir));
              item.pages.push({file:rel,visibleCharacters:text.length,title,placeholders:ph,broken});
              if(text.length<180)item.issues.push(`${rel}: short ${text.length}`);
              if(!title)item.issues.push(`${rel}: missing title`);
              const key=title.toLowerCase(); if(title&&titles.has(key))item.issues.push(`${rel}: duplicate title with ${titles.get(key)} -> ${title}`); else if(title)titles.set(key,rel);
              if(ph.length)item.issues.push(`${rel}: placeholders ${ph.join(', ')}`);
              if(broken.length)item.issues.push(`${rel}: broken ${broken.join(', ')}`);
            }
            report.push(item);
          }
          fs.writeFileSync('out/diagnostics.json',JSON.stringify(report,null,2)+'\n');
          console.log(JSON.stringify(report,null,2));
          NODE
          node /tmp/diagnose.js

      - uses: actions/upload-artifact@v4
        with:
          name: phase1-diagnostics
          path: out
