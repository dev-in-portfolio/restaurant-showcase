name: Temporary Phase 1 diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out controller branch
        uses: actions/checkout@v4
        with:
          path: controller

      - name: Check out latest showcase main
        uses: actions/checkout@v4
        with:
          repository: dev-in-portfolio/restaurant-showcase
          ref: main
          path: showcase

      - name: Check out latest staging main
        uses: actions/checkout@v4
        with:
          repository: dev-in-portfolio/restaurant-staging
          ref: main
          path: staging

      - name: Check out shared source files
        uses: actions/checkout@v4
        with:
          repository: dev-in-portfolio/restaurants
          ref: main
          path: thunderdome

      - name: Build final copies and capture post-fix validator output
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          STAGING_ROOT=staging SHOWCASE_ROOT=showcase THUNDERDOME_ROOT=thunderdome OUT_DIR=out \
            node controller/.github/scripts/phase1-promote.js >out/static-validator-build.log 2>&1

          python3 - <<'PY'
          from pathlib import Path

          root = Path('showcase/restaurants/barts-mart')
          old = "if (typeof event !== 'undefined' && event && event.target) event.target.classList.add('active');"
          new = "if (typeof event !== 'undefined' && event && event.target && event.target.classList) event.target.classList.add('active');"
          for file in root.glob('*.html'):
              text = file.read_text(encoding='utf-8')
              file.write_text(text.replace(old, new), encoding='utf-8')

          for file in [Path('showcase/scripts/validate-showcase.js'), Path('showcase/scripts/import-approved-restaurant.js')]:
              text = file.read_text(encoding='utf-8')
              text = text.replace('/placeholder/i', r'/\bplaceholder\b(?!\s*=)/i')
              file.write_text(text, encoding='utf-8')
          PY

          set +e
          (cd showcase && npm test) >out/npm-test.log 2>&1
          TEST_STATUS=$?
          (cd showcase && npm run validate:all) >out/validate-all.log 2>&1
          VALIDATE_STATUS=$?
          set -e
          printf 'npm_test=%s\nvalidate_all=%s\n' "$TEST_STATUS" "$VALIDATE_STATUS" >out/status.txt
          cat out/npm-test.log
          cat out/validate-all.log

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: phase1-validator-diagnostics
          path: out
