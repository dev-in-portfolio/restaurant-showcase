name: Hard-code showcase pipeline metrics

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/hardcode-showcase-pipeline-metrics.yml'

permissions:
  contents: write

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace showroom metrics
        shell: python
        run: |
          from pathlib import Path

          path = Path('restaurants/index.html')
          text = path.read_text(encoding='utf-8')

          old_css = '''    .metrics {
              display: grid;
              grid-template-columns: repeat(3, 1fr);
              gap: 1.5rem;
              max-width: 800px;
              margin: 0 auto 3.5rem;
            }'''.replace('      ', '')

          new_css = '''    .metrics {
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
              gap: 1rem;
              max-width: 1100px;
              margin: 0 auto 3.5rem;
            }'''.replace('      ', '')

          old_metrics = '''    <div class="metrics">
              <div class="metric-card">
                <div class="metric-value" id="count-approved">57</div>
                <div class="metric-label">Approved Builds</div>
              </div>
              <div class="metric-card">
                <div class="metric-value" id="count-neighborhoods">15</div>
                <div class="metric-label">Neighborhoods</div>
              </div>
              <div class="metric-card">
                <div class="metric-value">100%</div>
                <div class="metric-label">QA Validated</div>
              </div>
            </div>'''.replace('      ', '')

          new_metrics = '''    <div class="metrics" aria-label="Restaurant website pipeline totals">
              <div class="metric-card">
                <div class="metric-value">650</div>
                <div class="metric-label">Unique Restaurants</div>
              </div>
              <div class="metric-card">
                <div class="metric-value">501</div>
                <div class="metric-label">Active Queue</div>
              </div>
              <div class="metric-card">
                <div class="metric-value">55</div>
                <div class="metric-label">At a Later Time</div>
              </div>
              <div class="metric-card">
                <div class="metric-value">94</div>
                <div class="metric-label">Ready for Polish</div>
              </div>
              <div class="metric-card">
                <div class="metric-value">57</div>
                <div class="metric-label">Approved Builds</div>
              </div>
            </div>'''.replace('      ', '')

          old_js = '''        // Update dashboard counters
                document.getElementById('count-approved').textContent = restaurants.length;
                
                const neighborhoods = [...new Set(restaurants.map(r => r.neighborhood))].filter(Boolean).sort();
                document.getElementById('count-neighborhoods').textContent = neighborhoods.length;'''.replace('        ', '')

          new_js = '''        // Header pipeline metrics are intentionally hard-coded.
                const neighborhoods = [...new Set(restaurants.map(r => r.neighborhood))].filter(Boolean).sort();'''.replace('        ', '')

          replacements = [
              ('metrics CSS', old_css, new_css),
              ('metrics markup', old_metrics, new_metrics),
              ('dynamic counter JavaScript', old_js, new_js),
          ]

          for label, old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Expected {label} block was not found; refusing partial update.')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')

      - name: Commit completed update and remove temporary workflow
        run: |
          rm .github/workflows/hardcode-showcase-pipeline-metrics.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add restaurants/index.html .github/workflows/hardcode-showcase-pipeline-metrics.yml
          git commit -m "Hard-code restaurant pipeline counts in showcase header"
          git push
