name: Hard-code showcase pipeline metrics

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/hardcode-showcase-pipeline-metrics.yml'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Replace showroom metrics
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('restaurants/index.html')
          text = path.read_text(encoding='utf-8')

          new_css = """    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      max-width: 1100px;
      margin: 0 auto 3.5rem;
    }"""

          text, css_count = re.subn(
              r"    \.metrics \{\n      display: grid;\n      grid-template-columns: repeat\(3, 1fr\);\n      gap: 1\.5rem;\n      max-width: 800px;\n      margin: 0 auto 3\.5rem;\n    \}",
              new_css,
              text,
              count=1,
          )

          new_metrics = """    <div class="metrics" aria-label="Restaurant website pipeline totals">
      <div class="metric-card">
        <div class="metric-value">650</div>
        <div class="metric-label">Unique Restaurants</div>
      </div>
      <div class="metric-card">
        <div class="metric-value">501</div>
        <div class="metric-label">Active Queue</div>
      </div>
      <div class="metric-card">
        <div class="metric-value">55</div>
        <div class="metric-label">At a Later Time</div>
      </div>
      <div class="metric-card">
        <div class="metric-value">94</div>
        <div class="metric-label">Ready for Polish</div>
      </div>
      <div class="metric-card">
        <div class="metric-value">57</div>
        <div class="metric-label">Approved Builds</div>
      </div>
    </div>"""

          text, metrics_count = re.subn(
              r'    <div class="metrics">.*?    </div>\n  </header>',
              new_metrics + '\n  </header>',
              text,
              count=1,
              flags=re.DOTALL,
          )

          text, js_count = re.subn(
              r"        // Update dashboard counters\n        document\.getElementById\('count-approved'\)\.textContent = restaurants\.length;\n\s*\n        const neighborhoods = \[\.\.\.new Set\(restaurants\.map\(r => r\.neighborhood\)\)\]\.filter\(Boolean\)\.sort\(\);\n        document\.getElementById\('count-neighborhoods'\)\.textContent = neighborhoods\.length;",
              "        // Header pipeline metrics are intentionally hard-coded.\n        const neighborhoods = [...new Set(restaurants.map(r => r.neighborhood))].filter(Boolean).sort();",
              text,
              count=1,
          )

          if (css_count != 1 or metrics_count != 1 or js_count != 1:
              raise SystemExit(
                  f'Refusing partial update: css={css_count}, metrics={metrics_count}, js={js_count}'
              )

          path.write_text(text, encoding='utf-8')

      - name: Commit completed update and remove temporary files
        run: |
          rm -f .github/workflows/hardcode-showcase-pipeline-metrics.yml
          rm -f .showcase-metrics-update-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Hard-code restaurant pipeline counts in showcase header"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
