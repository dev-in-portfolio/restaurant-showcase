<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Final Restaurant Showcase</title>
  <meta name="description" content="Presentation-ready restaurant website showcase portal.">
  <meta http-equiv="refresh" content="0; url=restaurants/">
  <link rel="canonical" href="restaurants/">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: radial-gradient(circle at top, #2b2520, #11100f 55%);
      color: #f7f3ea;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }
    main { max-width: 42rem; }
    .eyebrow {
      color: #e8bd72;
      font-size: .75rem;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    h1 { margin: .5rem 0 1rem; font-size: clamp(2rem, 7vw, 4rem); }
    p { color: #c9c1b6; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 1rem;
      padding: .85rem 1rem;
      border-radius: .65rem;
      background: #f0c477;
      color: #21180b;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
  <script>
    window.location.replace('restaurants/');
  </script>
</head>
<body>
  <main>
    <div class="eyebrow">Polished Showroom</div>
    <h1>Final Restaurant Showcase</h1>
    <p>Opening the presentation-ready restaurant portal.</p>
    <a href="restaurants/">Open Showcase Portal</a>
  </main>
</body>
</html>
